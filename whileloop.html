<html>
    <head>
        Ex Of printing number 1 to 10 with while loop
        <br>
        <br>
        <script>
            var no=1;
            while(no<=10){
                document.write(no);
                document.write("<br>");
                console.log(no);
                no++;
            }
        </script>
    </head>
</html>
