<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascrpt build in sting function</title>
      <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 200px;
            border: 5px solid black;
            padding: 100px;
            font-size: larger;
        }
    </style>
</head>
<body>
    <br><br>
    <script>
        var s="universe";
        var s1="THANKYOU";
        document.write("String length is "+s.length+"<br>");
        document.write("Charcter in the 2th position is "+s.charAt("7")+"<br>");
        document.write("Position of the index e in string s: "+s.indexOf("e")+"<br>");
        document.write("Converted to uppercase :"+s.toUpperCase()+"<br>");
        document.write("Converted to lower case :"+s1.toLowerCase()+"<br>");
        document.write("Converted to bold: "+s.bold()+"<br>");
        document.write("Converted to italic: "+s.italics+"<br>");
        document.write("Show it in blue color: "+s.fontcolor("blue")+"<br>");
        document.write("Show it in the Big Font: "+s.fontsize(8)+"<br>");

    </script>
    
</body>
</html>
