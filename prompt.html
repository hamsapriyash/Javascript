<html>
    <head>
        <title>Ex Of Prompt</title>
    </head>
    <body>
        <script type="text/javascript">
            var name=prompt("Enter You Name?","Harry Potter");
            if(name!=""){
                document.write("Your name is "+name);
            }else{
                document.write("You did not enter a name")
            }
        </script>
    </body>
</html>
