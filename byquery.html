<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Query Selector Method</h1>
    <ol>
        <li>Universe</li>
        <li>Manifestation</li>
    </ol>
    <ol>
        <li>Blessing</li>
        <li>Abundance</li>
    </ol>
    <a href="#">Explore</a>
    <p class="example">I Love The Universe</p>
    <p class="example">I am thankfull to evrything</p>
    <p id="demo">I always belive You</p>
    <script>
        document.querySelector("h1").style.backgroundColor="red";
        document.querySelector("a").style.backgroundColor="yellow";
         document.querySelector("#demo").style.backgroundColor="pink";
         document.querySelectorAll("ol").forEach(list => {
         list.style.backgroundColor = "cyan";});
        const ex=document.querySelectorAll(".example");
        for(let i=0;i<ex.length;i++){
            ex[i].style.backgroundColor="MediumSeaGreen";
        }
    </script>
</body>
</html>
