<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Function</title>
      <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 200px;
            border: 5px solid black;
            padding: 100px;
            font-size: larger;
        }
    </style>
</head>
<body>
    <script>
        var d1=new Date();
        document.write("Value of d1 is "+ d1+"<br>");
        document.write("Today Date "+d1.getDate()+"<br>");
        document.write("Full Year is "+d1.getFullYear()+"<br>");
        document.write("Present hour is "+d1.getHours()+"<br>");
        document.writeln("Present minute is "+d1.getMinutes()+"<br>");
        document.writeln("Today's day "+d1.getDay());
    </script>

    
</body>
</html>
