<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time</title>
    <script>
        function time(){
            ti=new Date()
            document.write(ti.getHours()+";"+ti.getMinutes()+";"+ti.getSeconds())
        }
        function myfunction(){
            setInterval(function()
            {mytimer()},1000);
        }
        function mytimer(){
            var d=new Date();
            var t=d.toLocaleTimeString();
            document.getElementById("demo").innerHTML=t;
            document.getElementById("bt1").style.display="none";

        }
    </script>
</head>
<body>
    <center>
    <h1>Welcome To My Website </h1>
   It's time <script>time()</script> O'Clock !!
    </center>
    <p id="demo">
        Here is the Running Clock
    </p><br><br>
    <input type="button" id="bt1" value="Show Time" onclick="myfunction()"/>
</body>
</html>
