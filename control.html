<html>
    <head>
        <script language="javascript">
            function exit(){
                var x=confirm("Do you want to continue?");
                if(x==true){
                    alert("User want to continue");
                }
                else{
                    alert("User don't want to continue");
                }
            }
        </script>
    </head>
    <body>
        <center><br><br>
            <h1>Welcome to the page</h1>
            Press exit button to close the browser<br/><br>
            <input type="button" name="b1" value="Exit" onclick="return exit()">
        </center>
    </body>
</html>
