<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Else </title>
    <script>
        function vote(){
            var x=document.f1.age.value;
            if(x>=18){
                document.write( "You are eligible to vote." ) ;
            }
            else{
                document.write( "You are not eligible to vote." ) ;
            }
        }
    </script>
</head>
<body>
    <center>
       <h2>Welcome to Your Right</h2>
       <br>
       <form name="f1" method="post">
        <br>
        <label>Enter Your Age</label>
        <br>
        <input type="number" name="age" >
        <br>
        <input type="submit" name="s1" onclick="vote()" value="Check Eligibility">
       </form>
    </center>
    
</body>
</html>
