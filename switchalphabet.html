<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Using alphabet</title>
</head>
<body>
    See your console
    <script>
        var fruit="mango";
        switch(fruit)
        {
            case 'apple':
                case 'bannan':
                    case 'mango':
                        console.log("Your Fruit is "+ fruit);
            break;
            default:
                console.log("Invalid data");
            break;

        }
    </script>
</body>
</html>
